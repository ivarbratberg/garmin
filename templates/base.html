<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Garmin Activities{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1rem;
      }
      .flash {
        padding: 0.75rem;
        border-radius: 6px;
        margin-bottom: 1rem;
      }
      .flash.error {
        background: #ffe6e6;
      }
      .flash.info {
        background: #e9f3ff;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #ddd;
        padding: 0.5rem;
        text-align: left;
      }
      th {
        background: #f5f5f5;
      }
      input {
        width: 100%;
        padding: 0.5rem;
        margin: 0.3rem 0 0.8rem;
        box-sizing: border-box;
      }
      button, .button-link {
        display: inline-block;
        background: #0077cc;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 0.55rem 0.9rem;
        text-decoration: none;
        cursor: pointer;
      }
      .button-link.secondary {
        background: #666;
      }
      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .modal-backdrop.open {
        display: flex;
      }
      .modal-panel {
        background: #fff;
        border-radius: 10px;
        max-width: 960px;
        width: 100%;
        max-height: 90vh;
        overflow: auto;
        padding: 1rem 1.25rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 1rem;
        margin-bottom: 0.75rem;
      }
      .modal-header h2 {
        margin: 0;
        font-size: 1.15rem;
      }
      .modal-close {
        background: transparent;
        color: #333;
        border: none;
        font-size: 1.5rem;
        line-height: 1;
        cursor: pointer;
        padding: 0 0.25rem;
      }
      .metric-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem 1.2rem;
        margin: 0.75rem 0 1rem;
        padding: 0.75rem;
        background: #f8f8f8;
        border-radius: 6px;
        border: 1px solid #e5e5e5;
      }
      .metric-picker label {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        cursor: pointer;
        font-size: 0.9rem;
      }
      tr.activity-row {
        cursor: pointer;
      }
      tr.activity-row:hover {
        background: #f0f7ff;
      }
      .chart-wrap {
        position: relative;
        height: 380px;
        margin-top: 0.5rem;
      }
      .chart-status {
        padding: 1rem;
        color: #555;
      }
    </style>
  </head>
  <body>
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </body>
</html>
