<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Garmin Activities{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      .card {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 1rem;
      }
      .flash {
        padding: 0.75rem;
        border-radius: 6px;
        margin-bottom: 1rem;
      }
      .flash.error {
        background: #ffe6e6;
      }
      .flash.info {
        background: #e9f3ff;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border: 1px solid #ddd;
        padding: 0.5rem;
        text-align: left;
      }
      th {
        background: #f5f5f5;
      }
      input {
        width: 100%;
        padding: 0.5rem;
        margin: 0.3rem 0 0.8rem;
        box-sizing: border-box;
      }
      button, .button-link {
        display: inline-block;
        background: #0077cc;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 0.55rem 0.9rem;
        text-decoration: none;
        cursor: pointer;
      }
      .button-link.secondary {
        background: #666;
      }
    </style>
  </head>
  <body>
    {% with messages = get_flashed_messages(with_categories=True) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </body>
</html>
